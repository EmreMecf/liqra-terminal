name: liqra_terminal
description: "Liqra Terminal Pro — Esnaf ERP / POS / Cari Muhasebe"
publish_to: 'none'

version: 2.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # Local database
  sqflite: ^2.4.2
  sqflite_common_ffi: ^2.3.4   # Windows/Linux/macOS desktop desteği
  path_provider: ^2.1.5
  path: ^1.9.1

  # UI
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  fl_chart: ^0.70.2

  # Thermal printer / PDF
  pdf: ^3.11.1
  printing: ^5.14.2

  # HTTP / Network
  dio: ^5.8.0
  connectivity_plus: ^6.1.1

  # Utils
  intl: ^0.20.2
  uuid: ^4.5.1
  shared_preferences: ^2.3.2
  csv: ^6.0.0                   # CSV parse (POS export)
  file_picker: ^8.1.2           # Windows dosya seçici

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
